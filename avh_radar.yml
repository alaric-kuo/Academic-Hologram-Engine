name: AVH Semantic Timestamp Pipeline

on:
  push:
    paths:
      - '**/*.md'
      - '**/*.tex'
      - 'avh_manifest.json'
      - '!README.md'
      - '!AVH_OBSERVATION_LOG.md'
      - '!WP_Ready_*.html'
      - '!*_Archive.tex'

permissions:
  contents: write

jobs:
  run-hologram-and-archive:
    runs-on: ubuntu-latest

    steps:
      - name: 🛰️ 載入宇宙網格
        uses: actions/checkout@v4

      - name: 🐍 部署算力引擎
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 📦 安裝相變依賴套件
        run: pip install openai requests numpy

      - name: 🔮 啟動 AVH 引擎理論收斂
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          S2_API_KEY: ${{ secrets.S2_API_KEY }}
        run: python avh_core.py

      - name: 🚩 資訊熵同步 (Commit 觀測日誌)
        run: |
          git config --local user.email "avh-bot@aj-consulting.net"
          git config --local user.name "AVH Hologram Oracle"
          git add AVH_OBSERVATION_LOG.md
          git commit -m "📡 AVH 軌跡刻印：批次拓樸觀測完成 [skip ci]" || echo "無相變發生"
          git push

      - name: ⏳ 刻印語意時間戳與多維資產 (Create Semantic Release)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "$HEX_CODE" ]; then
            TIMESTAMP=$(date +'%Y%m%d_%H%M%S')
            TAG_NAME="AVH-State-${HEX_CODE}-${TIMESTAMP}"
            
            # 將日誌、LaTeX 檔、WP 專用 HTML 一次性打包發布
            gh release create "$TAG_NAME" AVH_OBSERVATION_LOG.md *_Archive.tex WP_Ready_*.html \
              -t "狀態矩陣更新 - 演化時間戳 $TIMESTAMP" \
              -n "知識本體已完成收斂。此 Release 包含：\n1. AVH 實作軌跡日誌\n2. WordPress 專用 HTML 實體 (含認證標籤)\n3. LaTeX 原始碼"
          fi
